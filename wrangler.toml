# Cloudflare Workers Configuration
# Learn more: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "anthemhenderson-com"
main = "workers/_worker.ts"
compatibility_date = "2026-02-13"
compatibility_flags = ["nodejs_compat"]

# Account details
account_id = ""  # Add your Cloudflare account ID
workers_dev = true

# Build configuration
[build]
command = "npm run build"

# Environment variables
[vars]
DEBUG = "false"

# Routes - apply workers to specific paths
[[routes]]
pattern = "anthemhenderson.com/*"
zone_name = "anthemhenderson.com"

[[routes]]
pattern = "www.anthemhenderson.com/*"
zone_name = "anthemhenderson.com"

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Production environment
[env.production]
name = "anthemhenderson-com-production"
vars = { DEBUG = "false" }
routes = [
  { pattern = "anthemhenderson.com/*", zone_name = "anthemhenderson.com" },
  { pattern = "www.anthemhenderson.com/*", zone_name = "anthemhenderson.com" }
]

# Staging environment
[env.staging]
name = "anthemhenderson-com-staging"
vars = { DEBUG = "true" }
routes = [
  { pattern = "staging.anthemhenderson.com/*", zone_name = "anthemhenderson.com" }
]

# Observability
[observability]
enabled = true
head_sampling_rate = 1

# Limits
[limits]
cpu_ms = 50
